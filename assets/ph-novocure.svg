<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#faf0dd"/><stop offset=".55" stop-color="#eac98f"/><stop offset="1" stop-color="#b97f24"/>
</linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="180%">
<feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0e1b2c" flood-opacity=".28"/>
</filter>
<pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
<circle cx="2" cy="2" r="1.8" fill="#7c5416" opacity=".18"/>
</pattern>
</defs>

<rect width="800" height="520" fill="url(#bg)"/>
<circle cx="680" cy="40" r="200" fill="#ffffff" opacity=".16"/>
<circle cx="60" cy="490" r="160" fill="#ffffff" opacity=".12"/>
<rect x="500" y="330" width="260" height="160" fill="url(#dots)"/>
<rect x="40" y="30" width="180" height="120" fill="url(#dots)"/>

<!-- browser: HCP portal -->
<g transform="rotate(-2 305 253)" filter="url(#sh)">
  <rect x="70" y="88" width="470" height="330" rx="16" fill="#ffffff"/>
  <circle cx="94" cy="110" r="4.5" fill="#e6604d"/><circle cx="110" cy="110" r="4.5" fill="#eec22f"/><circle cx="126" cy="110" r="4.5" fill="#5fc26a"/>
  <rect x="150" y="101" width="300" height="18" rx="9" fill="#f5f1e8"/>
  <line x1="70" y1="130" x2="540" y2="130" stroke="#efe9dc" stroke-width="1.5"/>
  <!-- top bar with market/language switch (US / DE / FR) -->
  <rect x="94" y="146" width="150" height="14" rx="7" fill="#7c5416" opacity=".6"/>
  <g>
    <rect x="404" y="142" width="112" height="24" rx="12" fill="#f5f1e8"/>
    <rect x="410" y="147" width="30" height="14" rx="7" fill="#b97f24" opacity=".9"/>
    <rect x="446" y="151" width="26" height="7" rx="3.5" fill="#7c5416" opacity=".4"/>
    <rect x="480" y="151" width="26" height="7" rx="3.5" fill="#7c5416" opacity=".4"/>
  </g>
  <!-- resource cards grid -->
  <g>
    <rect x="94" y="184" width="136" height="96" rx="12" fill="#faf6ee"/>
    <rect x="108" y="198" width="36" height="36" rx="10" fill="#efdfc2"/>
    <path d="M126 208 v16 M118 216 h16" stroke="#b97f24" stroke-width="3.5" stroke-linecap="round"/>
    <rect x="108" y="244" width="92" height="9" rx="4.5" fill="#7c5416" opacity=".5"/>
    <rect x="108" y="261" width="66" height="8" rx="4" fill="#7c5416" opacity=".28"/>
    <rect x="242" y="184" width="136" height="96" rx="12" fill="#faf6ee"/>
    <rect x="256" y="198" width="36" height="36" rx="10" fill="#efdfc2"/>
    <path d="M266 222 l6 -10 4 6 6 -12" stroke="#b97f24" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="256" y="244" width="92" height="9" rx="4.5" fill="#7c5416" opacity=".5"/>
    <rect x="256" y="261" width="58" height="8" rx="4" fill="#7c5416" opacity=".28"/>
    <rect x="390" y="184" width="126" height="96" rx="12" fill="#faf6ee"/>
    <rect x="404" y="198" width="36" height="36" rx="10" fill="#efdfc2"/>
    <circle cx="420" cy="214" r="8" fill="none" stroke="#b97f24" stroke-width="3.5"/>
    <path d="M426 220 l8 8" stroke="#b97f24" stroke-width="3.5" stroke-linecap="round"/>
    <rect x="404" y="244" width="82" height="9" rx="4.5" fill="#7c5416" opacity=".5"/>
    <rect x="404" y="261" width="54" height="8" rx="4" fill="#7c5416" opacity=".28"/>
  </g>
  <!-- document list -->
  <rect x="94" y="300" width="160" height="11" rx="5.5" fill="#7c5416" opacity=".45"/>
  <g opacity=".92">
    <rect x="94" y="326" width="18" height="22" rx="4" fill="#efdfc2"/><rect x="122" y="330" width="150" height="9" rx="4.5" fill="#7c5416" opacity=".32"/><rect x="286" y="330" width="40" height="9" rx="4.5" fill="#b97f24" opacity=".45"/>
    <rect x="94" y="358" width="18" height="22" rx="4" fill="#efdfc2"/><rect x="122" y="362" width="126" height="9" rx="4.5" fill="#7c5416" opacity=".32"/><rect x="286" y="362" width="40" height="9" rx="4.5" fill="#b97f24" opacity=".45"/>
  </g>
  <!-- accessible CTA with a visible focus ring (WCAG nod) -->
  <rect x="390" y="322" width="126" height="34" rx="17" fill="#b97f24"/>
  <rect x="412" y="334" width="82" height="9" rx="4.5" fill="#ffffff" opacity=".92"/>
  <rect x="385" y="317" width="136" height="44" rx="22" fill="none" stroke="#1d3f8f" stroke-width="2.5" stroke-dasharray="5 4" opacity=".7"/>
  <rect x="390" y="374" width="126" height="9" rx="4.5" fill="#7c5416" opacity=".3"/>
</g>

<!-- phone: therapy companion -->
<g transform="rotate(4 650 300)" filter="url(#sh)">
  <rect x="566" y="128" width="168" height="344" rx="26" fill="#0e1b2c"/>
  <rect x="573" y="135" width="154" height="330" rx="20" fill="#ffffff"/>
  <rect x="622" y="143" width="56" height="14" rx="7" fill="#0e1b2c"/>
  <rect x="589" y="170" width="90" height="12" rx="6" fill="#7c5416" opacity=".55"/>
  <!-- calendar strip -->
  <g>
    <rect x="589" y="196" width="26" height="34" rx="8" fill="#f5f1e8"/>
    <rect x="619" y="196" width="26" height="34" rx="8" fill="#b97f24"/>
    <rect x="649" y="196" width="26" height="34" rx="8" fill="#f5f1e8"/>
    <rect x="679" y="196" width="26" height="34" rx="8" fill="#f5f1e8"/>
    <rect x="596" y="206" width="12" height="6" rx="3" fill="#7c5416" opacity=".4"/>
    <rect x="626" y="206" width="12" height="6" rx="3" fill="#ffffff" opacity=".85"/>
    <rect x="656" y="206" width="12" height="6" rx="3" fill="#7c5416" opacity=".4"/>
    <rect x="686" y="206" width="12" height="6" rx="3" fill="#7c5416" opacity=".4"/>
  </g>
  <!-- adherence ring -->
  <g transform="translate(650 300)">
    <circle r="44" fill="#faf6ee"/>
    <circle r="35" fill="none" stroke="#efe4cd" stroke-width="8"/>
    <circle r="35" fill="none" stroke="#b97f24" stroke-width="8" stroke-linecap="round" stroke-dasharray="165 220" transform="rotate(-90)"/>
    <rect x="-20" y="-7" width="40" height="14" rx="7" fill="#b97f24" opacity=".8"/>
  </g>
  <g opacity=".92">
    <circle cx="601" cy="374" r="8" fill="#efdfc2"/><rect x="617" y="369" width="66" height="8" rx="4" fill="#7c5416" opacity=".32"/>
    <circle cx="601" cy="400" r="8" fill="#efdfc2"/><rect x="617" y="395" width="52" height="8" rx="4" fill="#7c5416" opacity=".32"/>
  </g>
  <rect x="589" y="424" width="122" height="30" rx="15" fill="#b97f24"/>
  <rect x="622" y="435" width="56" height="8" rx="4" fill="#ffffff" opacity=".9"/>
</g>

<!-- care badge -->
<g transform="rotate(-6 96 96)" filter="url(#sh)">
  <circle cx="96" cy="96" r="34" fill="#ffffff"/>
  <path d="M96 112 C82 102 76 92 80 84 C83 78 91 77 96 83 C101 77 109 78 112 84 C116 92 110 102 96 112 Z" fill="#b97f24"/>
</g>
</svg>
