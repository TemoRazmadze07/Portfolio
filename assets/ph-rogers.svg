<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#fbe7ea"/><stop offset=".55" stop-color="#efa9b3"/><stop offset="1" stop-color="#c0364d"/>
</linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="180%">
<feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0e1b2c" flood-opacity=".28"/>
</filter>
<pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
<circle cx="2" cy="2" r="1.8" fill="#7e2434" opacity=".18"/>
</pattern>
</defs>

<rect width="800" height="520" fill="url(#bg)"/>
<circle cx="680" cy="40" r="200" fill="#ffffff" opacity=".14"/>
<circle cx="60" cy="490" r="160" fill="#ffffff" opacity=".10"/>
<rect x="500" y="330" width="260" height="160" fill="url(#dots)"/>
<rect x="40" y="30" width="180" height="120" fill="url(#dots)"/>

<!-- browser: rep-facing sales console -->
<g transform="rotate(-2 305 253)" filter="url(#sh)">
  <rect x="70" y="88" width="470" height="330" rx="16" fill="#ffffff"/>
  <circle cx="94" cy="110" r="4.5" fill="#e6604d"/><circle cx="110" cy="110" r="4.5" fill="#eec22f"/><circle cx="126" cy="110" r="4.5" fill="#5fc26a"/>
  <rect x="150" y="101" width="300" height="18" rx="9" fill="#faf0f1"/>
  <line x1="70" y1="130" x2="540" y2="130" stroke="#f2e4e6" stroke-width="1.5"/>
  <!-- customer header -->
  <circle cx="110" cy="162" r="14" fill="#f6d7db"/>
  <circle cx="110" cy="158" r="5" fill="#7e2434" opacity=".5"/>
  <path d="M101 169 a9 6 0 0 1 18 0" fill="#7e2434" opacity=".5"/>
  <rect x="134" y="150" width="120" height="12" rx="6" fill="#7e2434" opacity=".55"/>
  <rect x="134" y="170" width="80" height="8" rx="4" fill="#7e2434" opacity=".28"/>
  <rect x="428" y="148" width="88" height="26" rx="13" fill="#faf0f1"/>
  <rect x="440" y="157" width="64" height="8" rx="4" fill="#c0364d" opacity=".65"/>
  <!-- compare 3 devices -->
  <g>
    <rect x="94" y="196" width="130" height="130" rx="12" fill="#fdf8f8" stroke="#c0364d" stroke-width="1.5"/>
    <rect x="134" y="210" width="50" height="76" rx="10" fill="#f6d7db"/>
    <rect x="150" y="216" width="18" height="4" rx="2" fill="#7e2434" opacity=".4"/>
    <rect x="106" y="296" width="70" height="9" rx="4.5" fill="#7e2434" opacity=".5"/>
    <rect x="106" y="311" width="44" height="8" rx="4" fill="#c0364d" opacity=".6"/>
    <rect x="240" y="196" width="130" height="130" rx="12" fill="#fdf8f8"/>
    <rect x="280" y="210" width="50" height="76" rx="10" fill="#f2e4e6"/>
    <rect x="296" y="216" width="18" height="4" rx="2" fill="#7e2434" opacity=".3"/>
    <rect x="252" y="296" width="70" height="9" rx="4.5" fill="#7e2434" opacity=".4"/>
    <rect x="252" y="311" width="44" height="8" rx="4" fill="#7e2434" opacity=".3"/>
    <rect x="386" y="196" width="130" height="130" rx="12" fill="#fdf8f8"/>
    <rect x="426" y="210" width="50" height="76" rx="10" fill="#f2e4e6"/>
    <rect x="442" y="216" width="18" height="4" rx="2" fill="#7e2434" opacity=".3"/>
    <rect x="398" y="296" width="70" height="9" rx="4.5" fill="#7e2434" opacity=".4"/>
    <rect x="398" y="311" width="44" height="8" rx="4" fill="#7e2434" opacity=".3"/>
  </g>
  <!-- one legible payment summary -->
  <rect x="94" y="344" width="422" height="52" rx="12" fill="#fdf3f4"/>
  <rect x="110" y="360" width="96" height="10" rx="5" fill="#7e2434" opacity=".5"/>
  <rect x="110" y="378" width="64" height="8" rx="4" fill="#7e2434" opacity=".28"/>
  <rect x="300" y="364" width="70" height="12" rx="6" fill="#7e2434" opacity=".6"/>
  <rect x="404" y="356" width="96" height="28" rx="14" fill="#c0364d"/>
  <rect x="424" y="366" width="56" height="9" rx="4.5" fill="#ffffff" opacity=".92"/>
</g>

<!-- phone: order status -->
<g transform="rotate(4 650 300)" filter="url(#sh)">
  <rect x="566" y="128" width="168" height="344" rx="26" fill="#0e1b2c"/>
  <rect x="573" y="135" width="154" height="330" rx="20" fill="#ffffff"/>
  <rect x="622" y="143" width="56" height="14" rx="7" fill="#0e1b2c"/>
  <rect x="589" y="170" width="96" height="12" rx="6" fill="#7e2434" opacity=".55"/>
  <!-- stepper -->
  <g>
    <circle cx="602" cy="212" r="8" fill="#c0364d"/>
    <path d="M599 212 l2.5 2.5 4.5 -5" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="610" y="210" width="26" height="4" rx="2" fill="#c0364d"/>
    <circle cx="646" cy="212" r="8" fill="#c0364d"/>
    <path d="M643 212 l2.5 2.5 4.5 -5" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="654" y="210" width="26" height="4" rx="2" fill="#f2e4e6"/>
    <circle cx="690" cy="212" r="8" fill="none" stroke="#e5aab3" stroke-width="2"/>
  </g>
  <!-- order card -->
  <rect x="589" y="238" width="122" height="74" rx="12" fill="#fdf3f4"/>
  <rect x="601" y="252" width="36" height="46" rx="8" fill="#f6d7db"/>
  <rect x="645" y="254" width="56" height="9" rx="4.5" fill="#7e2434" opacity=".5"/>
  <rect x="645" y="272" width="42" height="8" rx="4" fill="#7e2434" opacity=".3"/>
  <rect x="645" y="290" width="50" height="8" rx="4" fill="#c0364d" opacity=".6"/>
  <!-- timeline -->
  <g opacity=".92">
    <circle cx="601" cy="336" r="6" fill="#c0364d"/><rect x="615" y="331" width="72" height="8" rx="4" fill="#7e2434" opacity=".35"/>
    <line x1="601" y1="344" x2="601" y2="360" stroke="#e5aab3" stroke-width="2"/>
    <circle cx="601" cy="368" r="6" fill="#c0364d" opacity=".55"/><rect x="615" y="363" width="58" height="8" rx="4" fill="#7e2434" opacity=".3"/>
    <line x1="601" y1="376" x2="601" y2="392" stroke="#e5aab3" stroke-width="2"/>
    <circle cx="601" cy="400" r="6" fill="none" stroke="#e5aab3" stroke-width="2"/><rect x="615" y="395" width="64" height="8" rx="4" fill="#7e2434" opacity=".25"/>
  </g>
  <rect x="589" y="424" width="122" height="30" rx="15" fill="#c0364d"/>
  <rect x="620" y="435" width="60" height="8" rx="4" fill="#ffffff" opacity=".9"/>
</g>

<!-- signal badge -->
<g transform="rotate(-6 96 96)" filter="url(#sh)">
  <circle cx="96" cy="96" r="34" fill="#ffffff"/>
  <g fill="#c0364d">
    <rect x="80" y="102" width="7" height="10" rx="2.5"/>
    <rect x="91" y="94" width="7" height="18" rx="2.5"/>
    <rect x="102" y="86" width="7" height="26" rx="2.5" opacity=".55"/>
  </g>
</g>
</svg>
