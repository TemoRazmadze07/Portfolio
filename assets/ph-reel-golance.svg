<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
<defs>
<linearGradient id="rbg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#0b1026"/><stop offset=".5" stop-color="#111b4d"/><stop offset="1" stop-color="#1c30b5"/>
</linearGradient>
<radialGradient id="rglow" cx="62%" cy="38%" r="60%">
<stop offset="0" stop-color="#5a8cff" stop-opacity=".4"/><stop offset="1" stop-color="#5a8cff" stop-opacity="0"/>
</radialGradient>
<linearGradient id="rbar" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#39d98a"/><stop offset="1" stop-color="#0a7d43"/>
</linearGradient>
<filter id="rsh" x="-30%" y="-30%" width="160%" height="180%">
<feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#000000" flood-opacity=".45"/>
</filter>
<pattern id="rdots" width="26" height="26" patternUnits="userSpaceOnUse">
<circle cx="2" cy="2" r="1.8" fill="#8fb3ff" opacity=".2"/>
</pattern>
</defs>

<rect width="1280" height="720" fill="url(#rbg)"/>
<rect width="1280" height="720" fill="url(#rglow)"/>
<rect x="60" y="430" width="380" height="230" fill="url(#rdots)"/>
<rect x="900" y="60" width="320" height="200" fill="url(#rdots)"/>

<!-- candidate profile card -->
<g transform="rotate(-3 400 360)" filter="url(#rsh)">
  <rect x="200" y="210" width="400" height="300" rx="22" fill="#ffffff"/>
  <circle cx="280" cy="290" r="38" fill="#dcf5e7"/>
  <circle cx="280" cy="279" r="14" fill="#0a7d43" opacity=".55"/>
  <path d="M254 308 a26 17 0 0 1 52 0" fill="#0a7d43" opacity=".55"/>
  <rect x="336" y="262" width="170" height="20" rx="10" fill="#0e1b2c" opacity=".75"/>
  <rect x="336" y="294" width="120" height="14" rx="7" fill="#0e1b2c" opacity=".3"/>
  <rect x="240" y="356" width="150" height="13" rx="6.5" fill="#0e1b2c" opacity=".45"/>
  <rect x="240" y="382" width="320" height="14" rx="7" fill="#e8f5ee"/>
  <rect x="240" y="382" width="250" height="14" rx="7" fill="url(#rbar)"/>
  <rect x="240" y="414" width="320" height="14" rx="7" fill="#e8f5ee"/>
  <rect x="240" y="414" width="196" height="14" rx="7" fill="url(#rbar)" opacity=".75"/>
  <rect x="240" y="446" width="320" height="14" rx="7" fill="#e8f5ee"/>
  <rect x="240" y="446" width="282" height="14" rx="7" fill="url(#rbar)" opacity=".9"/>
</g>

<!-- match ring panel -->
<g transform="rotate(2.5 880 360)" filter="url(#rsh)">
  <rect x="680" y="180" width="400 " height="360" rx="22" fill="#ffffff"/>
  <g transform="translate(880 330)">
    <circle r="95" fill="#f2faf5"/>
    <circle r="78" fill="none" stroke="#dcebe2" stroke-width="16"/>
    <circle r="78" fill="none" stroke="url(#rbar)" stroke-width="16" stroke-linecap="round" stroke-dasharray="451 490" transform="rotate(-90)"/>
    <rect x="-48" y="-16" width="96" height="32" rx="16" fill="#0a7d43"/>
    <rect x="-30" y="-6" width="60" height="12" rx="6" fill="#ffffff" opacity=".9"/>
  </g>
  <rect x="744" y="452" width="272" height="16" rx="8" fill="#0e1b2c" opacity=".4"/>
  <rect x="786" y="484" width="188" height="12" rx="6" fill="#0e1b2c" opacity=".22"/>
</g>

<!-- floating chip -->
<g transform="rotate(-5 640 150)" filter="url(#rsh)">
  <rect x="530" y="118" width="220" height="56" rx="28" fill="#ffffff"/>
  <circle cx="566" cy="146" r="14" fill="#dcf5e7"/>
  <path d="M560 146 l4.5 4.5 8 -9" stroke="#0a7d43" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="592" y="139" width="136" height="14" rx="7" fill="#0e1b2c" opacity=".7"/>
</g>

<!-- subtle letterbox vignette -->
<rect x="0" y="0" width="1280" height="90" fill="#0b1026" opacity=".35"/>
<rect x="0" y="630" width="1280" height="90" fill="#0b1026" opacity=".35"/>
</svg>
