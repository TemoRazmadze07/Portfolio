  <!-- scenario question -->
  <rect x="589" y="192" width="104" height="11" rx="5.5" fill="#0d5c36" opacity=".55"/>
  <rect x="589" y="212" width="122" height="9" rx="4.5" fill="#0d5c36" opacity=".3"/>
  <rect x="589" y="230" width="96" height="9" rx="4.5" fill="#0d5c36" opacity=".3"/>
  <!-- answer options -->
  <rect x="589" y="258" width="122" height="34" rx="10" fill="#f2faf5" stroke="#0a7d43" stroke-width="1.5"/>
  <circle cx="606" cy="275" r="6" fill="#0a7d43"/>
  <rect x="620" y="271" width="70" height="8" rx="4" fill="#0d5c36" opacity=".45"/>
  <rect x="589" y="300" width="122" height="34" rx="10" fill="#f6f8fb"/>
  <circle cx="606" cy="317" r="6" fill="none" stroke="#b9c6bf" stroke-width="1.8"/>
  <rect x="620" y="313" width="58" height="8" rx="4" fill="#0d5c36" opacity=".3"/>
  <rect x="589" y="342" width="122" height="34" rx="10" fill="#f6f8fb"/>
  <circle cx="606" cy="359" r="6" fill="none" stroke="#b9c6bf" stroke-width="1.8"/>
  <rect x="620" y="355" width="76" height="8" rx="4" fill="#0d5c36" opacity=".3"/>
  <!-- next -->
  <rect x="589" y="420" width="122" height="30" rx="15" fill="#0a7d43"/>
  <rect x="629" y="431" width="42" height="8" rx="4" fill="#ffffff" opacity=".9"/>
</g>

<!-- AI sparkle badge -->
<g transform="rotate(-6 96 96)" filter="url(#sh)">
  <circle cx="96" cy="96" r="34" fill="#ffffff"/>
  <path d="M96 74 L101 89 L116 94 L101 99 L96 114 L91 99 L76 94 L91 89 Z" fill="#0a7d43"/>
  <circle cx="114" cy="78" r="4" fill="#0a7d43" opacity=".55"/>
