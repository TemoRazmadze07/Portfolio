<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#e6f6ec"/><stop offset=".55" stop-color="#aedcc0"/><stop offset="1" stop-color="#0a7d43"/>
</linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="180%">
<feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0e1b2c" flood-opacity=".28"/>
</filter>
<pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
<circle cx="2" cy="2" r="1.8" fill="#0d5c36" opacity=".16"/>
</pattern>
</defs>

<rect width="800" height="520" fill="url(#bg)"/>
<circle cx="680" cy="40" r="200" fill="#ffffff" opacity=".14"/>
<circle cx="60" cy="490" r="160" fill="#ffffff" opacity=".10"/>
<rect x="500" y="330" width="260" height="160" fill="url(#dots)"/>
<rect x="40" y="30" width="180" height="120" fill="url(#dots)"/>

<!-- browser: AI matching for hiring -->
<g transform="rotate(-2 305 253)" filter="url(#sh)">
  <rect x="70" y="88" width="470" height="330" rx="16" fill="#ffffff"/>
  <circle cx="94" cy="110" r="4.5" fill="#e6604d"/><circle cx="110" cy="110" r="4.5" fill="#eec22f"/><circle cx="126" cy="110" r="4.5" fill="#5fc26a"/>
  <rect x="150" y="101" width="300" height="18" rx="9" fill="#eef2f8"/>
  <line x1="70" y1="130" x2="540" y2="130" stroke="#e8ecf3" stroke-width="1.5"/>
  <!-- header: role summary -->
  <rect x="94" y="150" width="170" height="15" rx="7.5" fill="#0d5c36" opacity=".6"/>
  <rect x="94" y="174" width="110" height="9" rx="4.5" fill="#0d5c36" opacity=".26"/>
  <!-- candidate card A (best match) -->
  <rect x="94" y="200" width="270" height="92" rx="12" fill="#f2faf5" stroke="#0a7d43" stroke-width="1.5"/>
  <circle cx="128" cy="234" r="18" fill="#aedcc0"/>
  <circle cx="128" cy="228" r="6.5" fill="#0d5c36" opacity=".55"/>
  <path d="M116 244 a12 8 0 0 1 24 0" fill="#0d5c36" opacity=".55"/>
  <rect x="158" y="216" width="92" height="11" rx="5.5" fill="#0d5c36" opacity=".55"/>
  <rect x="158" y="236" width="64" height="8" rx="4" fill="#0d5c36" opacity=".3"/>
  <rect x="158" y="256" width="120" height="9" rx="4.5" fill="#aedcc0"/>
  <rect x="158" y="256" width="88" height="9" rx="4.5" fill="#0a7d43" opacity=".8"/>
  <rect x="286" y="212" width="64" height="18" rx="9" fill="#dcf5e7"/>
  <rect x="294" y="217" width="48" height="8" rx="4" fill="#0a7d43" opacity=".75"/>
  <!-- candidate card B -->
  <rect x="94" y="304" width="270" height="80" rx="12" fill="#f6f8fb"/>
  <circle cx="128" cy="336" r="16" fill="#dce6f6"/>
  <circle cx="128" cy="331" r="6" fill="#1d3f8f" opacity=".4"/>
  <path d="M117 345 a11 7 0 0 1 22 0" fill="#1d3f8f" opacity=".4"/>
  <rect x="158" y="320" width="80" height="10" rx="5" fill="#1d3f8f" opacity=".4"/>
  <rect x="158" y="340" width="56" height="8" rx="4" fill="#1d3f8f" opacity=".25"/>
  <rect x="158" y="360" width="120" height="9" rx="4.5" fill="#e3e8f0"/>
  <rect x="158" y="360" width="58" height="9" rx="4.5" fill="#1d3f8f" opacity=".35"/>
  <!-- match ring: 92% -->
  <g transform="translate(452 250)">
    <circle r="52" fill="#f2faf5"/>
    <circle r="42" fill="none" stroke="#dce9e1" stroke-width="9"/>
    <circle r="42" fill="none" stroke="#0a7d43" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="243 264" transform="rotate(-90)"/>
    <rect x="-26" y="-8" width="52" height="16" rx="8" fill="#0a7d43" opacity=".85"/>
    <rect x="-18" y="22" width="36" height="7" rx="3.5" fill="#0d5c36" opacity=".35"/>
  </g>
  <rect x="404" y="330" width="96" height="26" rx="13" fill="#0a7d43"/>
  <rect x="424" y="339" width="56" height="8" rx="4" fill="#ffffff" opacity=".9"/>
</g>

<!-- phone: cultural-fit assessment -->
<g transform="rotate(4 650 300)" filter="url(#sh)">
  <rect x="566" y="128" width="168" height="344" rx="26" fill="#0e1b2c"/>
